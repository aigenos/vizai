<svg xmlns="http://www.w3.org/2000/svg" width="880" height="240" viewBox="0 0 880 240" role="img" aria-label="dAIly — your personal AI analyst">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5">
        <animate attributeName="stop-color" values="#4f46e5;#7c3aed;#4f46e5" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="55%" stop-color="#7c3aed">
        <animate attributeName="stop-color" values="#7c3aed;#c026d3;#7c3aed" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#c026d3">
        <animate attributeName="stop-color" values="#c026d3;#4f46e5;#c026d3" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity=".14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="876" height="236" rx="24" fill="url(#bg)"/>
  <rect x="2" y="2" width="876" height="236" rx="24" fill="url(#shine)">
    <animateTransform attributeName="transform" type="translate" values="-880 0; 880 0; -880 0" dur="9s" repeatCount="indefinite"/>
  </rect>

  <!-- robot tile -->
  <rect x="46" y="62" width="84" height="84" rx="22" fill="#ffffff" fill-opacity=".16" stroke="#ffffff" stroke-opacity=".22"/>
  <text x="88" y="120" font-family="-apple-system,'Segoe UI',Roboto,Arial,sans-serif" font-size="44" text-anchor="middle">🤖</text>

  <!-- wordmark -->
  <text x="156" y="86" font-family="-apple-system,'Segoe UI',Roboto,Arial,sans-serif" font-size="13" letter-spacing="4" font-weight="600" fill="#ffffff" fill-opacity=".82">BY AIGENOS · DAILY AI INTELLIGENCE</text>
  <text x="152" y="142" font-family="-apple-system,'Segoe UI',Roboto,Arial,sans-serif" font-size="58" font-weight="800" fill="#ffffff" letter-spacing="-1">d<tspan fill="#fcd34d">AI</tspan>ly</text>
  <text x="156" y="178" font-family="-apple-system,'Segoe UI',Roboto,Arial,sans-serif" font-size="19" font-weight="500" fill="#ffffff" fill-opacity=".94">Your personal AI analyst — reads everything in AI daily, tells you what to build.</text>

  <!-- live pulse dot -->
  <circle cx="806" cy="74" r="6" fill="#4ade80">
    <animate attributeName="opacity" values="1;.3;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="806" cy="74" r="6" fill="none" stroke="#4ade80" stroke-width="2">
    <animate attributeName="r" values="6;14" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".8;0" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="790" y="79" font-family="-apple-system,'Segoe UI',Roboto,Arial,sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="end" fill-opacity=".9">SHIPS DAILY</text>

  <!-- bottom meta row -->
  <text x="156" y="208" font-family="-apple-system,'Segoe UI',Roboto,Arial,sans-serif" font-size="13" font-weight="600" fill="#ffffff" fill-opacity=".75">⚡ 90-sec briefing &#160;·&#160; 🚀 Opportunity of the Day &#160;·&#160; 🔗 every claim source-linked &#160;·&#160; 🔁 fork it for your field</text>
</svg>
