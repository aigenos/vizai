name: Daily AI Digest

on:
  schedule:
    # 12:00 UTC daily = 8:00 AM US Eastern (EDT, UTC-4). In winter (EST, UTC-5)
    # this is 7:00 AM ET — change to "0 13 * * *" if you want 8 AM year-round.
    - cron: "0 12 * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Avoid overlapping runs.
concurrency:
  group: daily-ai-digest
  cancel-in-progress: false

# Needed so the job can commit the published archive back to the repo.
permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # The `secrets` context can't be used in an `if:` — map it to job-level env
    # so the restore step can gate on `env.OPPORTUNITY_B64` instead.
    env:
      OPPORTUNITY_B64: ${{ secrets.OPPORTUNITY_B64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # OPTIONAL secret sauce: the Opportunity Map (src/private/opportunity.py) is
      # gitignored, so it is NOT in the repo. If you set the OPPORTUNITY_B64 secret
      # (base64 of your private module), CI restores it to disk for this run only —
      # so your email includes it, while the public archive has it stripped out.
      # Forks without the secret simply run without the section. To create it:
      #   base64 -w0 src/private/opportunity.py        (Linux)
      #   certutil -encode src/private/opportunity.py tmp && type tmp   (Windows)
      - name: Restore private sections (optional)
        if: ${{ env.OPPORTUNITY_B64 != '' }}
        run: |
          mkdir -p src/private
          printf '%s' "$OPPORTUNITY_B64" | base64 -d > src/private/opportunity.py
          echo "Restored private opportunity section."

      - name: Build, send, archive & notify
        env:
          PROVIDER: ${{ vars.PROVIDER || 'gemini' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ vars.EMAIL_TO }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM || 'AI Daily Digest <onboarding@resend.dev>' }}
          DIGEST_MODEL: ${{ vars.DIGEST_MODEL }}
          # Optional stronger model for the Opportunity sections (two-pass).
          OPPORTUNITY_MODEL: ${{ vars.OPPORTUNITY_MODEL }}
          # Field preset: ai (default) | security | biotech | fintech | yours.
          SOURCE_PRESET: ${{ vars.SOURCE_PRESET }}
          LOOKBACK_DAYS: ${{ vars.LOOKBACK_DAYS || '7' }}
          ENABLE_WEB_SEARCH: ${{ vars.ENABLE_WEB_SEARCH || 'true' }}
          DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
          # Drop items already covered by a previous digest (docs/.state/).
          CROSS_DAY_DEDUP: ${{ vars.CROSS_DAY_DEDUP || 'true' }}
          # HEAD-check links before sending; dead ones are flagged, never fatal.
          ENABLE_LINK_CHECK: ${{ vars.ENABLE_LINK_CHECK || 'true' }}
          # Public archive (GitHub Pages). Private sections are stripped on publish.
          PUBLISH_ARCHIVE: ${{ vars.PUBLISH_ARCHIVE || 'true' }}
          SITE_TITLE: ${{ vars.SITE_TITLE || 'dAIly — Daily AI Digest' }}
          SITE_URL: ${{ vars.SITE_URL }}
          SUBSCRIBE_URL: ${{ vars.SUBSCRIBE_URL }}
          SUBSCRIBE_FORM_ACTION: ${{ vars.SUBSCRIBE_FORM_ACTION }}
          # Provider-agnostic subscribe form snippet (Buttondown/Beehiiv/...).
          SUBSCRIBE_EMBED_HTML: ${{ vars.SUBSCRIBE_EMBED_HTML }}
          # Unsubscribe link or merge tag for the email footer — required
          # before sending to anyone but yourself.
          UNSUBSCRIBE_URL: ${{ vars.UNSUBSCRIBE_URL }}
          SHOW_MODEL_ATTRIBUTION: ${{ vars.SHOW_MODEL_ATTRIBUTION || 'true' }}
          # Audio digest (free gTTS).
          ENABLE_AUDIO: ${{ vars.ENABLE_AUDIO || 'false' }}
          # Subscriber delivery: sends the public issue to your Buttondown
          # list (captured by the landing-page form). teaser | full.
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          BUTTONDOWN_MODE: ${{ vars.BUTTONDOWN_MODE || 'teaser' }}
          # Optional multi-channel delivery.
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main

      # Commit the freshly published archive (docs/) back to the repo so GitHub
      # Pages serves it. Enable Pages: Settings → Pages → Deploy from branch →
      # main → /docs. Only runs when there are archive changes to commit.
      # Non-fatal: a push-permission issue must NOT mark the digest run as failed
      # (the email is the real deliverable). If this is skipped/red, enable
      # Settings → Actions → General → Workflow permissions → "Read and write".
      - name: Publish archive to repo
        if: ${{ vars.PUBLISH_ARCHIVE != 'false' }}
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ || true
          if git diff --cached --quiet; then
            echo "No archive changes to commit."
          else
            git commit -m "archive: daily digest $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Upload rendered digest + audio (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-digest
          path: |
            digest_*.html
            out/*.mp3
          if-no-files-found: ignore
          retention-days: 14
