name: Refresh README screenshots

# Re-renders docs/assets/hero-{light,dark}.png from the newest archived digest.
# Manual (Actions tab → Run workflow) or weekly, so the README hero stays fresh.
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 14 * * 1" # Mondays, after the daily digest has landed

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: |
          pip install -r requirements-dev.txt
          python -m playwright install --with-deps chromium

      - name: Render light + dark hero PNGs
        run: python scripts/make_screenshots.py

      - name: Commit refreshed assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/assets/ || true
          if git diff --cached --quiet; then
            echo "Screenshots unchanged."
          else
            git commit -m "assets: refresh README screenshots"
            git push
          fi
